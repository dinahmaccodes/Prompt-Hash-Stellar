name: Backend CI

on:
  pull_request:
    paths:
      - ".github/workflows/backend.yml"
      - "server/**"
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/backend.yml"
      - "server/**"

permissions:
  contents: read

jobs:
  backend:
    name: Build and Validate Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build backend
        run: npm run build
